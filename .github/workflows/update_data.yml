name: Update Stock Data

on:
  schedule:
    # 9:30am ET (market open) = 1:30pm UTC
    - cron: '30 13 * * 1-5'
    # 1:00pm ET (midday) = 5:00pm UTC
    - cron: '0 17 * * 1-5'
    # 4:30pm ET (market close) = 8:30pm UTC
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch stock data
        run: python scripts/fetch_data.py

      - name: Fetch bond and commodity data
        run: python scripts/fetch_market_data.py

      - name: Fetch macro data (VIX, PCR, FRED)
        run: python scripts/fetch_macro.py

      - name: Run options backtest
        run: python scripts/run_backtest.py

      - name: Snapshot value scores (once per day)
        run: python scripts/snapshot_scores.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json public/data/options.json public/data/bonds.json public/data/commodities.json public/data/backtest_options.json public/data/macro.json public/data/score_history.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%dT%H:%M UTC')"
          git pull --rebase origin main
          git push origin main
